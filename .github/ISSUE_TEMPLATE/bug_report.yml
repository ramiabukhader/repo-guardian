name: Bug report
description: Report reproducible incorrect or unsafe audit behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets, tokens, or private repository content.
  - type: input
    id: version
    attributes:
      label: repo-guardian version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use synthetic filenames and redact local paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and private repository content from this report.
          required: true
